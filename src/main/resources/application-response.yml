# ===================================================================
# Spring Boot configuration for the "response" profile.
#
# This profile is used for ECS Fargate response processing jobs.
# NO web server - runs as a command-line job and exits.
# ===================================================================

spring:
  application:
    name: pos-trx-ade
  main:
    web-application-type: none
    banner-mode: 'off'
    allow-bean-definition-overriding: true

  session:
    store-type: none

  task:
    scheduling:
      pool:
        size: ${SPRING_TASK_SCHEDULING_POOL_SIZE:1}

  # Datasource routed by TenantAwareDataSource as in batch profile.
  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
    properties:
      hibernate.dialect: org.hibernate.dialect.MySQL8Dialect
      hibernate.default_schema: ${DB_NAME:posappdb}
      hibernate.jdbc.time_zone: UTC
      hibernate.id.new_generator_mappings: true
      hibernate.globally_quoted_identifiers: true
      hibernate.connection.provider_disables_autocommit: true
      hibernate.cache.use_second_level_cache: false
      hibernate.cache.use_query_cache: false
      hibernate.format_sql: false
      hibernate.generate_statistics: false
      hibernate.jdbc.batch_size: 100
      hibernate.order_inserts: true
      hibernate.order_updates: true
      hibernate.jdbc.fetch_size: 500
      hibernate.criteria.literal_handling_mode: BIND
      hibernate.query.fail_on_pagination_over_collection_fetch: true
      hibernate.query.in_clause_parameter_padding: true

  jmx:
    enabled: false

logging:
  level:
    root: INFO
    it.deloitte.postrxade: INFO
    it.deloitte.postrxade.batch.ResponseProcessingRunner: INFO
    it.deloitte.postrxade.service.impl.ResponseRunFileServiceImpl: INFO
    it.deloitte.postrxade.service.impl.S3ServiceImpl: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    com.zaxxer.hikari: INFO
    org.mariadb.jdbc: WARN
    org.mariadb: WARN

aws:
  s3:
    bucket-name: ${S3_BUCKET_NAME}
    region: ${S3_BUCKET_REGION}
    output-folder: ${S3_BUCKET_OUTPUT_FOLDER}
    input-folder: ${S3_BUCKET_INPUT_FOLDER}
    input-folder-loaded: ${S3_BUCKET_INPUT_FOLDER_LOADED}

application:
  authority:
    info-env: 'INT'
  ingestion:
    use-staging: true
  rest:
    tracing-request:
      enabled: false

multi-tenant:
  bootstrap-tenant: ${TENANT_ID:nexi}
  tenants:
    nexi:
      database-name: ${DB_NAME:posappdb}
      database-url: jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:posappdb}?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true&autoReconnect=true&failOverReadOnly=false&maxReconnects=3&connectTimeout=30000&socketTimeout=900000&trustServerCertificate=true
      database-username: ${DB_USERNAME:posappusr}
      database-password: ${DB_PASSWORD:}
      output-codice-fiscale: "04107060966"
    amex:
      database-name: ${DB_NAME:posappdb}
      database-url: jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:posappdb}?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true&autoReconnect=true&failOverReadOnly=false&maxReconnects=3&connectTimeout=30000&socketTimeout=900000&trustServerCertificate=true
      database-username: ${DB_USERNAME:posappusr}
      database-password: ${DB_PASSWORD:}
      output-codice-fiscale: "14778691007"
    shift4:
      database-name: ${DB_NAME:shift4_posappdb}
      database-url: jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:shift4_posappdb}?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true&autoReconnect=true&failOverReadOnly=false&maxReconnects=3&connectTimeout=30000&socketTimeout=900000&trustServerCertificate=true
      database-username: ${DB_USERNAME:shift4_posappusr}
      database-password: ${DB_PASSWORD:}
      output-codice-fiscale: "97920860158"
