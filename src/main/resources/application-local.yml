# ===================================================================
# Spring Boot configuration for the "local" profile.
#
# This configuration overrides the application.yml file.
# Used for local development with MySQL database.
# ===================================================================

# JVM arguments for Java 21 compatibility
# Add these to your IDE run configuration or Maven command
# --add-opens java.base/java.lang=ALL-UNNAMED
# --add-opens java.base/java.util=ALL-UNNAMED

# ===================================================================
# Standard Spring Boot properties.
# Full reference is available at:
# http://docs.spring.io/spring-boot/docs/current/reference/html/common-application-properties.html
# ===================================================================

fe-url: http://localhost:8082
#user-role: SPR
logging:
#    config: file:logback-spring.xml
    config: classpath:logback-spring.xml
    # Local development logging: Keep SQL logs visible for debugging
    level:
        org.hibernate.SQL: DEBUG  # Keep SQL query logging in local for debugging
        org.hibernate.type.descriptor.sql.BasicBinder: DEBUG  # Keep SQL parameter binding logs in local

management:
    endpoints:
        web:
            base-path: /private-monitor
            exposure:
                include: ['configprops', 'env', 'health', 'info', 'logfile', 'loggers', 'prometheus', 'threaddump', 'caches']
    endpoint:
        health:
            show-details: always
            probes:
                enabled: true
    health:
        group:
            liveness:
                include: livenessState
            readiness:
                include: readinessState

spring:
    application:
        name: pos-trx-ade

    datasource:
        type: com.zaxxer.hikari.HikariDataSource
        # MySQL AWS RDS Database for local development
        url: jdbc:mariadb://db-pos-nprod.c1ocgkekaqhr.eu-central-1.rds.amazonaws.com:3306/posappdb?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true&autoReconnect=true&connectTimeout=10000&socketTimeout=120000&trustServerCertificate=true
        username: posappusr
        password: GNEMOBY
        driverClassName: org.mariadb.jdbc.Driver
        hikari:
            poolName: Hikari
            auto-commit: false
            # Pool size configuration - same as dev for consistency
            maximum-pool-size: 10
            minimum-idle: 2
            connection-timeout: 30000
            idle-timeout: 120000
            max-lifetime: 600000
            # Leak detection: 5 minutes for bulk operations (staging can take longer)
            leak-detection-threshold: 300000
            validation-timeout: 5000
            keepalive-time: 60000
            data-source-properties:
                cachePrepStmts: true
                prepStmtCacheSize: 250
                prepStmtCacheSqlLimit: 2048
                useServerPrepStmts: true

    jpa:
        open-in-view: false
        show-sql: true
        hibernate:
            ddl-auto: validate
            naming:
                physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
                implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
        properties:
            hibernate.dialect: org.hibernate.dialect.MySQL8Dialect
            hibernate.default_schema: posappdb
            hibernate.jdbc.time_zone: UTC
            hibernate.id.new_generator_mappings: true
            hibernate.globally_quoted_identifiers: true
            hibernate.connection.provider_disables_autocommit: true
            hibernate.cache.use_second_level_cache: false
            hibernate.cache.use_query_cache: false
            hibernate.format_sql: true
            hibernate.generate_statistics: false
            hibernate.jdbc.batch_size: 25
            hibernate.order_inserts: true
            hibernate.order_updates: true
            hibernate.jdbc.fetch_size: 150
            hibernate.criteria.literal_handling_mode: BIND
            hibernate.query.fail_on_pagination_over_collection_fetch: true
            hibernate.query.in_clause_parameter_padding: true
            hibernate.hbm2ddl.auto: validate
            hibernate.hbm2ddl.import_files: /sql/schema.sql

    jmx:
        enabled: false

    main:
        allow-bean-definition-overriding: true
        banner-mode: 'off'

    messages:
        basename: i18n/messages

    mvc:
        favicon:
            enabled: false

    security:
        oauth2:
            client:
                provider:
                    oidc:
                        authorization-uri: https://intapi.nexi.it/nexiauth/oauth/openid/v2/authorize
                        token-uri: https://intapi.nexi.local:8443/nexiauth/oauth/openid/v2/token
                        jwk-set-uri: https://intapi.nexi.local:8443/nexi/.well-known/jwks.json
                    oidc-deloitte:
                        authorization-uri: https://login.microsoftonline.com/160aa80d-a92c-48fe-b522-ed38be17fdda/oauth2/v2.0/authorize
                        token-uri: https://login.microsoftonline.com/160aa80d-a92c-48fe-b522-ed38be17fdda/oauth2/v2.0/token
                        jwk-set-uri: https://login.microsoftonline.com/160aa80d-a92c-48fe-b522-ed38be17fdda/discovery/v2.0/keys

                registration:
                    oidc:
                        client-id: 09ac55d2-249f-4025-a2c0-7c9bbbf55d39
                        client-secret: 2bb9962d-193a-4344-b795-5bd9e6d5ccb0
                        scope: openid
                        redirect-uri: http://localhost:8082/api/login/oauth2/code/oidc
                        client-authentication-method: client_secret_post
                        authorization-grant-type: authorization_code
                    oidc-deloitte:
                        provider: oidc-deloitte
                        client-id: 3facb5c1-bd57-494d-80fd-bc41c86f112d
                        client-secret: 0if8Q~uPAeu7yHdU155tBWAHmMgRYvciyXSDObQd
                        scope: openid,profile
                        redirect-uri: http://localhost:8082/api/login/oauth2/code/oidc-deloitte
                        client-authentication-method: post
                        authorization-grant-type: authorization_code

    session:
        store-type: jdbc
        jdbc:
            table-name: SPRING_SESSION
            initialize-schema: always

    task:
        execution:
            thread-name-prefix: pos-task-
            pool:
                core-size: 2
                max-size: 50
                queue-capacity: 10000
        scheduling:
            thread-name-prefix: pos-scheduling-
            pool:
                size: 2

    thymeleaf:
        mode: HTML

    output:
        ansi:
            console-available: true
    servlet:
        multipart:
            enabled: true
            file-size-threshold: 2KB
            max-file-size: 200MB
            max-request-size: 215MB
    docker:
        compose:
            enabled: false

# AWS S3 Configuration (uses IAM Role)
aws:
  region: eu-central-1
  s3:
    bucket-name: pos-euc-sbx
    region: eu-central-1
    output-folder: test-output
    input-folder: test-input
    input-folder-loaded: test-input-loaded
  ecs:
    enabled: false  # Disabled for local development
    cluster-name: local-cluster
    task-definition-output: local-output-task
    container-name-output: output-generation
    subnet-ids:
    security-group-ids:
    launch-type: FARGATE
    # Optional: Override OUTPUT_ROWS_PER_FILE for ECS tasks (if not set, uses task definition default: 1000000)
    output-rows-per-file: ${AWS_ECS_OUTPUT_ROWS_PER_FILE:}

    # H2 Database for development (commented out)
    # url: jdbc:h2:mem:posdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    # username: sa
    # password: 
    # driverClassName: org.h2.Driver

springdoc:
    api-docs:
        path: /api/docs/api-docs
    swagger-ui:
        path: /api/docs/index.html
        operations-sorter: alpha

server:
    compression:
        enabled: true
        mime-types: text/html,text/xml,text/plain,text/css,application/javascript,application/json
        min-response-size: 1024
    error:
        include-message: always
    port: 8082
    servlet:
        session:
            cookie:
                http-only: true
                same-site: lax
            timeout: 3600

# ===================================================================
# Application specific properties
# ===================================================================
application:
    authority:
        info-env: 'INT'
    # Ingestion configuration
    ingestion:
        # Use staging tables for high-performance ETL ingestion
        # Set to false to use legacy row-by-row approach for debugging
        use-staging: true
    http:
        header-name: ${spring.application.name}
    cors:
        allowed-origins: 'http://localhost:8080,http://localhost:8082,http://localhost:3000,http://localhost:4200'
        allowed-methods: 'GET,POST,PUT,DELETE,OPTIONS'
        allowed-headers: '*'
        exposed-headers: 'Authorization,Link,X-Total-Count,X-${application.http.header-name}-alert,X-${application.http.header-name}-error,X-${application.http.header-name}-params'
        allow-credentials: true
        max-age: 1800
    rest:
        tracing-request:
            enabled: true
    security:
        app-jwt:
            secret: dGVzdC1zZWNyZXQtYXBwLWp3dC0zMi1ieXRlcy1taW5pbXVtLWxlbg==
            expiration-seconds: 3600
        lambda-token: "my-secret-test-token-123"
        xsfr:
            enabled: true
            cookie-path: /
            # Durata cookie CSRF (template: 1 ora, persistente)
            cookie-max-age: 3600


# Docker Compose disabled - using external MySQL database
# Alternative: Set system property -Dspring.docker.compose.enabled=false

# ===================================================================
# Multi-Tenant Configuration (nexi = Nexi, amex = Amex). Vedi docs/env-and-deployment.md.
# ===================================================================
multi-tenant:
    bootstrap-tenant: nexi
    provider-display-names:
        oidc: Nexi
        oidc-amex: Amex
        oidc-deloitte: Deloitte
    tenants:
        nexi:
            database-name: ${NEXI_DB_NAME:posappdb}
            database-url: jdbc:mariadb://${DB_HOST:db-pos-nprod.c1ocgkekaqhr.eu-central-1.rds.amazonaws.com}:${DB_PORT:3306}/${NEXI_DB_NAME:posappdb}?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true&trustServerCertificate=true
            database-username: ${NEXI_DB_USER:posappusr}
            database-password: ${NEXI_DB_PASSWORD:GNEMOBY}
            output-codice-fiscale: "04107060966"
            sso:
                providers:
                    - oidc
                    - oidc-deloitte
        amex:
            database-name: ${AMEX_DB_NAME:aziendab_posappdb}
            database-url: jdbc:mariadb://${DB_HOST:db-pos-nprod.c1ocgkekaqhr.eu-central-1.rds.amazonaws.com}:${DB_PORT:3306}/${AMEX_DB_NAME:aziendab_posappdb}?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true&trustServerCertificate=true
            database-username: ${AMEX_DB_USER:aziendab_posappusr}
            database-password: ${AMEX_DB_PASSWORD:GNEMOBY}
            output-codice-fiscale: "14778691007"
            sso:
                providers:
                    - oidc-amex
                    - oidc-deloitte
